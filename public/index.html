<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk STK Push Bot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea,
    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Bulk STK Push Bot</h2>

  <label>Phone Numbers (one per line)</label>
  <textarea id="numbers" rows="10" placeholder="0798765432&#10;0712345678"></textarea>

  <label>Amount</label>
  <input type="number" id="amount" placeholder="1500">

  <label>Reference</label>
  <input type="text" id="reference" placeholder="ORDER-12345">

  <button onclick="sendBulkSTK()">Send STK Push</button>

  <pre id="output"></pre>
</div>

<script>
async function sendBulkSTK() {
  const numbers = document.getElementById('numbers').value;
  const amount = document.getElementById('amount').value;
  const external_reference = document.getElementById('reference').value;

  const output = document.getElementById('output');

  output.textContent = 'Sending requests...';

  try {
    const response = await fetch('/send-bulk-stk', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        numbers,
        amount,
        external_reference
      })
    });

    const data = await response.json();

    output.textContent = JSON.stringify(data, null, 2);

  } catch (error) {
    output.textContent = error.message;
  }
}
</script>

</body>
</html>
